name: Pull Request Events

on: pull_request

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-check:
    name: Lint and check types
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install

      - name: 🧶 Lint
        run: pnpm run lint

      - name: 🧪 Check types
        run: pnpm run check

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install

      - name: 🧪 Run tests
        run: pnpm test

  test-e2e:
    name: End-to-End tests
    needs: [test-unit, test-check]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: dev

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📥 Download dependencies
        run: |-
          pnpm install
          pnpm run copy:arcgis
          pnpm exec playwright install --with-deps

      - name: 🎭 Run Playwright tests
        run: pnpm exec playwright test --max-failures=10 --reporter=line,html
        env:
          VITE_DISCOVER: ${{ secrets.VITE_DISCOVER }}
          VITE_FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      - name: ⬆️ Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy-preview:
    name: Firebase preview
    runs-on: ubuntu-latest
    needs: [test-unit, test-check, test-e2e]
    if: ${{ github.head_ref != 'dev' }}
    environment:
      name: preview

    steps:
      - name: 🚀 Deploy
        uses: agrc/firebase-website-deploy-composite-action@v2
        with:
          identity-provider: ${{ secrets.IDENTITY_PROVIDER }}
          service-account-email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          project-id: ${{ secrets.PROJECT_ID }}
          preview: yes
          prebuild-command: pnpm run copy:arcgis
          build-command: pnpm run build --mode dev
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          VITE_DISCOVER: ${{ secrets.VITE_DISCOVER }}
          VITE_FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
